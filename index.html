<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ส่งยอดเบิก รปภ.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root{--green:#06C755;--navy:#101B4D}
    body{background:#f0f2f5;font-family:'Sarabun',sans-serif;padding-bottom:80px}
    #liff-loading{position:fixed;inset:0;background:rgba(255,255,255,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
    .spinner{width:48px;height:48px;border:5px solid #e5e7eb;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #error-screen{display:none;position:fixed;inset:0;background:#fff;z-index:9998;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
    .err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px;font-size:.82rem;color:#991b1b;max-width:400px;word-break:break-all;margin-top:12px;text-align:left}
    #register-screen{display:none;position:fixed;inset:0;background:#fff;z-index:9998;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
    .liff-header{background:linear-gradient(135deg,var(--navy),#1e3a8a);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    .user-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:.82rem;margin-top:5px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
    .tab-bar{background:#fff;border-bottom:2px solid #e5e7eb;display:flex}
    .tab-btn{flex:1;border:none;background:transparent;padding:11px 8px;font-size:.88rem;color:#6b7280;font-weight:600;border-bottom:3px solid transparent;cursor:pointer}
    .tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}
    .tab-pane{display:none}
    .tab-pane.active{display:block}
    .section-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin:10px;overflow:hidden}
    .card-head{background:#f8f9fa;padding:9px 14px;font-weight:700;font-size:.88rem;color:var(--navy);border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px}
    .form-wrap{padding:12px}
    .form-label{font-size:.83rem;font-weight:600;color:#374151;margin-bottom:3px}
    .form-control,.form-select{border-radius:8px;font-size:.88rem;border:1.5px solid #d1d5db}
    .form-control[readonly]{background:#f3f4f6;color:#6b7280}
    .emp-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;margin:8px 10px;overflow:hidden}
    .emp-head{background:#f8f9fa;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:.83rem;color:var(--navy)}
    .emp-body{padding:10px 12px}
    .btn-remove-emp{border:none;background:transparent;color:#ef4444;font-size:.8rem;cursor:pointer;padding:2px 6px;border-radius:4px}
    .btn-add-emp{display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 10px;padding:9px;border:2px dashed #3b82f6;border-radius:10px;color:#3b82f6;background:transparent;font-weight:600;font-size:.88rem;width:calc(100% - 20px);cursor:pointer}
    .btn-submit{position:fixed;bottom:0;left:0;right:0;border-radius:0;padding:15px;font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--green),#00b900);border:none;color:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.15);z-index:99}
    .badge-pending{background:#fef3c7;color:#92400e}
    .badge-transferred{background:#d1fae5;color:#065f46}
    .site-emp-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid #f3f4f6; font-size:.88rem; }
    .site-emp-item:last-child { border-bottom:none; }
    .btn-quick-add { background:#ebf5ff; color:#3b82f6; border:1px solid #bfdbfe; border-radius:6px; padding:4px 12px; font-size:.78rem; font-weight:600; cursor:pointer; transition:0.2s; }
    .btn-quick-add:hover { background:#dbeafe; }
  </style>
</head>
<body>

<div id="liff-loading">
  <div class="spinner"></div>
  <p id="loading-msg" style="margin-top:14px;color:var(--navy);font-weight:600;font-size:1rem;">กำลังเชื่อมต่อ LINE...</p>
  <p id="loading-sub" style="margin-top:4px;color:#6b7280;font-size:.8rem;"></p>
</div>

<div id="error-screen">
  <div style="font-size:3rem;color:#ef4444;">⚠️</div>
  <h5 style="color:#1f2937;margin-top:10px;">เกิดข้อผิดพลาด</h5>
  <div class="err-box" id="error-detail"></div>
  <button class="btn btn-sm btn-outline-secondary mt-3" onclick="location.reload()"><i class="fas fa-rotate me-1"></i> ลองใหม่</button>
</div>

<div id="register-screen">
  <div style="font-size:3rem;margin-bottom:10px;">🔐</div>
  <h5 style="color:#1f2937;margin-bottom:4px;">ยืนยันตัวตนครั้งแรก</h5>
  <p style="color:#6b7280;font-size:.88rem;margin-bottom:18px;">กรุณากรอก Password ที่ได้รับจาก Admin</p>
  <div style="width:90%;max-width:340px;">
    <input type="password" id="reg-password" class="form-control mb-3"
      placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')submitPassword()"
      style="text-align:center;font-size:1.1rem;letter-spacing:.12em;">
    <div id="reg-error" style="color:#ef4444;font-size:.83rem;min-height:20px;margin-bottom:8px;"></div>
    <button class="btn btn-primary w-100" id="reg-btn" onclick="submitPassword()">
      <i class="fas fa-unlock-alt me-2"></i>เข้าใช้งาน
    </button>
  </div>
</div>

<div id="main-app" style="display:none;">
  <div class="liff-header">
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <div style="font-size:.95rem;font-weight:700;"><i class="fas fa-shield-alt me-2"></i>ระบบเบิกเงิน รปภ.</div>
        <div class="user-badge"><span class="dot"></span><span id="user-name-display">...</span></div>
      </div>
      <div style="font-size:1.5rem;opacity:.5;"><i class="fab fa-line"></i></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="btn-tab-send" onclick="switchTab('send')"><i class="fas fa-paper-plane me-1"></i> ส่งรายการ</button>
    <button class="tab-btn" id="btn-tab-history" onclick="switchTab('history');loadMyRequests();"><i class="fas fa-history me-1"></i> รายการที่ส่งแล้ว</button>
  </div>

  <div id="tab-send" class="tab-pane active">
    <div class="section-card">
      <div class="card-head"><i class="fas fa-user-circle" style="color:var(--green)"></i> ข้อมูลผู้ส่ง</div>
      <div class="form-wrap">
        <div class="mb-3">
          <label class="form-label">ผู้ส่ง (LINE)</label>
          <input type="text" id="headName" class="form-control" readonly>
        </div>
        <div>
          <label class="form-label">หน่วยงาน <span class="text-danger">*</span></label>
          <select class="form-select" id="siteSelect" onchange="handleSiteChange()">
            <option value="">-- เลือกหน่วยงาน --</option>
          </select>
          <div id="site-empty-hint" class="text-warning mt-1" style="font-size:.78rem;display:none;">
            <i class="fas fa-exclamation-triangle me-1"></i>ไม่พบหน่วยงานในความรับผิดชอบ กรุณาติดต่อ Admin
          </div>
        </div>
      </div>
    </div>

    <div class="section-card" id="site-emp-card" style="display:none;">
      <div class="card-head" style="cursor:pointer;" onclick="toggleSiteEmpList()">
        <span><i class="fas fa-list-ul" style="color:#f59e0b"></i> พนักงานในหน่วยงาน</span>
        <i class="fas fa-chevron-down ms-auto" id="site-emp-arrow"></i>
      </div>
      <div class="form-wrap" id="site-emp-list-container" style="display:none; padding: 0;">
        <div id="site-emp-list"></div>
      </div>
    </div>

    <div class="section-card" style="padding-bottom:4px;">
      <div class="card-head"><i class="fas fa-users" style="color:#3b82f6"></i> รายการพนักงาน</div>
      <div id="empList" class="pt-1"></div>
      <button class="btn-add-emp" onclick="addEmpRow()"><i class="fas fa-plus-circle"></i> เพิ่มพนักงาน</button>
    </div>

    <div class="section-card">
      <div class="form-wrap d-flex justify-content-between">
        <span style="font-size:.85rem;color:#6b7280;">รายการ: <b id="count-emp">0</b> คน</span>
        <span style="font-size:.85rem;color:#6b7280;">รวม: <b id="sum-amount" class="text-success">0.00</b> บาท</span>
      </div>
    </div>
  </div>

  <div id="tab-history" class="tab-pane">
    <div style="padding:10px;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <b style="color:var(--navy);">รายการที่ส่งแล้ว</b>
        <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="loadMyRequests()"><i class="fas fa-rotate me-1"></i> รีเฟรช</button>
      </div>
      <div id="history-list">
        <div class="text-center text-muted py-5">
          <i class="fas fa-inbox fa-2x mb-2 d-block" style="opacity:.3"></i>กด "รีเฟรช" เพื่อโหลด
        </div>
      </div>
    </div>
  </div>
</div>

<button class="btn-submit" id="btn-submit-main" onclick="submitRequests()" style="display:none;">
  <i class="fas fa-paper-plane me-2"></i> ยืนยันส่งยอดเบิก
</button>

<script>
// =====================================================
const LIFF_ID    = '2009071711-LrtWbQgz';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxa3MfOzPz5hkSNLBGdOr_UUr0ZJu3UOuv98_yHu7UVlE7D9V2KvYe9TwgKqHJ9m4NIgw/exec';
// =====================================================

let currentUser = null;
let lineUserId  = null;
let empRowCount = 0;

function setMsg(main, sub) {
  document.getElementById('loading-msg').textContent = main || '';
  document.getElementById('loading-sub').textContent = sub  || '';
}
function hideLoading(){ document.getElementById('liff-loading').style.display = 'none'; }
function showError(msg){
  hideLoading();
  document.getElementById('error-detail').innerHTML = msg;
  document.getElementById('error-screen').style.display = 'flex';
}
function showRegisterScreen(uid){
  hideLoading();
  lineUserId = uid;
  document.getElementById('register-screen').style.display = 'flex';
  setTimeout(function(){ document.getElementById('reg-password').focus(); }, 100);
}

async function submitPassword(){
  const pw  = (document.getElementById('reg-password').value || '').trim();
  const errEl = document.getElementById('reg-error');
  const btn   = document.getElementById('reg-btn');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = 'กรุณากรอก Password'; return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>กำลังตรวจสอบ...';
  try {
    const data = await callBackend('registerByPassword', { password: pw, lineUserId: lineUserId });
    if (data && data.registered) {
      document.getElementById('register-screen').style.display = 'none';
      currentUser = data;
      await showMainApp(data);
    } else {
      errEl.textContent = (data && data.message) ? data.message : 'Password ไม่ถูกต้อง';
      document.getElementById('reg-password').value = '';
      document.getElementById('reg-password').focus();
    }
  } catch(err) {
    errEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-unlock-alt me-2"></i>เข้าใช้งาน';
  }
}
async function showMainApp(data){
  hideLoading();
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('btn-submit-main').style.display = 'block';
  document.getElementById('user-name-display').textContent = data.name + (data.role ? ' · ' + data.role : '');
  document.getElementById('headName').value = data.name;

  // dropdown หน่วยงาน (บนสุด) = หน่วยที่ดูแล
  populateSites(data.sites || []);

  // ✅ dropdown หน่วยงานที่ลง (ในแต่ละพนักงาน) = หน่วยงานทั้งหมด
  await ensureAllSitesLoaded();

  addEmpRow();
}

async function callBackend(action, params) {
  const qs  = new URLSearchParams({ liffApi: '1', action, ...(params || {}) });
  const res  = await fetch(WEBAPP_URL + '?' + qs.toString(), { redirect: 'follow' });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error('Server error: ' + text.slice(0, 300)); }
}

window.addEventListener('load', async function() {
  try {
    setMsg('กำลัง init LIFF...', 'ขั้นตอน 1/2');
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    setMsg('กำลังตรวจสอบสิทธิ์...', 'ขั้นตอน 2/2');
    const profile = await liff.getProfile();
    lineUserId = profile.userId;
    const data = await callBackend('checkAndGetSites', { lineUserId });
    
    if (!data || !data.registered) { showRegisterScreen(lineUserId); return; }
    currentUser = data;
    await showMainApp(data);
  } catch(err) {
    showError('<b>Error:</b> ' + err.message);
  }
});

function populateSites(sites){
  const sel = document.getElementById('siteSelect');
  sel.innerHTML = '<option value="">-- เลือกหน่วยงาน --</option>';
  if (!sites.length) {
    document.getElementById('site-empty-hint').style.display = 'block';
    return;
  }
  sites.forEach(s => {
    const o = document.createElement('option');
    o.value = s.id; o.textContent = s.name;
    sel.appendChild(o);
  });
  if (sites.length === 1) {
    sel.value = sites[0].id;
    handleSiteChange();
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el  => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('btn-tab-' + tab).classList.add('active');
  document.getElementById('btn-submit-main').style.display = tab === 'send' ? 'block' : 'none';
}

// ── Emp rows (ฟอร์มส่งรายการ) ──
function addEmpRow(){
  empRowCount++;
  const rid = 'emp_' + Date.now();
  const div = document.createElement('div');
  div.className = 'emp-card';
  div.id = rid;

  // ✅ ใช้รายการหน่วยงานทั้งหมดที่โหลดเก็บไว้ล่วงหน้าใน window.siteOptionsHtml
  // ถ้ายังไม่มี ให้โชว์ข้อความแทน
  const siteOptions = (window.siteOptionsHtml && window.siteOptionsHtml.trim() !== '')
    ? window.siteOptionsHtml
    : '<option value="" disabled>(ไม่พบข้อมูลหน่วยงาน)</option>';

  div.innerHTML = `
    <div class="emp-head">
      <span><i class="fas fa-user me-1" style="color:#3b82f6"></i> พนักงานคนที่ ${empRowCount}</span>
      <button class="btn-remove-emp" onclick="document.getElementById('${rid}').remove();updateSummary()">
        <i class="fas fa-times"></i> ลบ
      </button>
    </div>

    <div class="emp-body">
      <div class="row g-2">
        <div class="col-5">
          <label class="form-label">รหัสพนักงาน</label>
          <input type="number" class="form-control emp-id" placeholder="เช่น 1001" onchange="findEmpName(this)">
        </div>

        <div class="col-7">
          <label class="form-label">ชื่อ-นามสกุล</label>
          <input type="text" class="form-control emp-name" readonly placeholder="ค้นหาอัตโนมัติ">
        </div>

        <div class="col-6">
          <label class="form-label">ผลัด</label>
          <select class="form-select emp-shift">
            <option value="D">กลางวัน (D)</option>
            <option value="N">กลางคืน (N)</option>
          </select>
        </div>

        <div class="col-6">
          <label class="form-label">จำนวนเงิน</label>
          <input type="number" class="form-control text-end emp-amount" placeholder="0" oninput="updateSummary()">
        </div>

        <div class="col-12 mt-2">
          <label class="form-label">ประเภทการเบิก</label>
          <select class="form-select emp-type" style="font-size:.85rem;">
            <option value="เบิกล่วงหน้า" selected>เบิกล่วงหน้า</option>
            <option value="เบิกรายวันคนใหม่">เบิกรายวันคนใหม่</option>
            <option value="รับสดควงเวร">รับสดควงเวร</option>
            <option value="รับสดรายวัน">รับสดรายวัน</option>
          </select>
        </div>

        <div class="col-12 mt-2">
          <label class="form-label">หน่วยงานที่ลง</label>
          <select class="form-select emp-site" style="font-size:.85rem;">
            <option value="" disabled selected>-- เลือกหน่วยงาน --</option>
            ${siteOptions}
          </select>
        </div>

        <div class="col-12 mt-2">
          <label class="form-label">โน้ต <small class="text-muted">(ถ้ามี)</small></label>
          <input type="text" class="form-control emp-note" placeholder="หมายเหตุเพิ่มเติม...">
        </div>

      </div>
    </div>
  `;

  document.getElementById('empList').appendChild(div);
  updateSummary();
}
function findEmpName(inputElement) {
  const empId = $(inputElement).val();
  if (!empId) return;

  const rowDiv = $(inputElement).closest('.emp-card'); // หา div กรอบของพนักงานคนนี้
  rowDiv.find('.emp-name').val('กำลังค้นหา...');

  // เรียก Backend ไปค้นหาพนักงาน
  google.script.run.withSuccessHandler(function(res) {
    if (res.success) {
      // 1. ใส่ชื่อพนักงาน
      rowDiv.find('.emp-name').val(res.empName);
      
      // 2. 🌟 บังคับ Dropdown ให้เลือก "หน่วยงานประจำ" ของพนักงานคนนี้
      if (res.defaultSite) {
        rowDiv.find('.emp-site').val(res.defaultSite);
      }
    } else {
      rowDiv.find('.emp-name').val('ไม่พบข้อมูล');
      rowDiv.find('.emp-site').val(''); // เคลียร์ค่าหน่วยงานถ้าไม่เจอ
      Swal.fire('แจ้งเตือน', 'ไม่พบรหัสพนักงานนี้ในระบบ', 'warning');
    }
  }).getEmpInfoWithSite(empId);
}

function handleSiteChange() {
  const siteId = document.getElementById('siteSelect').value;
  const card = document.getElementById('site-emp-card');
  const listContainer = document.getElementById('site-emp-list-container');
  const arrow = document.getElementById('site-emp-arrow');

  if (!siteId) {
    if (card) card.style.display = 'none';
    return;
  }
  card.style.display = 'block';
  listContainer.style.display = 'none';
  arrow.className = 'fas fa-chevron-down ms-auto';
  loadSiteEmployees(siteId);
}

async function loadSiteEmployees(siteId) {
  const listEl = document.getElementById('site-emp-list');
  listEl.innerHTML = '<div class="text-center py-3 text-muted"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</div>';
  try {
    const emps = await callBackend('getEmployeesBySite', { siteId: siteId });
    if (!emps || emps.length === 0) {
      listEl.innerHTML = '<div class="text-center py-3 text-muted" style="font-size:0.85rem;">ไม่พบรายชื่อพนักงานในหน่วยงานนี้</div>';
      return;
    }
    let html = '';
    emps.forEach(emp => {
      html += `
        <div class="site-emp-item">
          <div>
            <div style="font-weight:700; color:var(--navy);">${emp.name}</div>
            <div style="color:#6b7280; font-size:0.75rem;"><i class="fas fa-id-badge me-1"></i> รหัส: ${emp.id}</div>
          </div>
          <button class="btn-quick-add" type="button" onclick="quickAddEmp('${emp.id}', '${emp.name}')">
            <i class="fas fa-plus me-1"></i> เบิก
          </button>
        </div>`;
    });
    listEl.innerHTML = html;
  } catch (err) {
    listEl.innerHTML = '<div class="text-center py-3 text-danger" style="font-size:0.85rem;">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
  }
}
  
function toggleSiteEmpList() {
  const container = document.getElementById('site-emp-list-container');
  const arrow = document.getElementById('site-emp-arrow');
  if (!container || !arrow) return;
  if (container.style.display === 'none' || container.style.display === '') {
    container.style.display = 'block';
    arrow.className = 'fas fa-chevron-up ms-auto';
  } else {
    container.style.display = 'none';
    arrow.className = 'fas fa-chevron-down ms-auto';
  }
}
  
function quickAddEmp(id, name) {
  const existingInputs = document.querySelectorAll('.emp-id');
  for (let input of existingInputs) {
    if (input.value === id) {
      Swal.fire({ title: 'มีรายชื่อนี้แล้ว!', icon: 'warning', toast: true, position: 'top', showConfirmButton: false, timer: 2000 });
      return;
    }
  }
  let emptyRowFound = false;
  document.querySelectorAll('.emp-card').forEach(card => {
    const idInput = card.querySelector('.emp-id');
    const nameInput = card.querySelector('.emp-name');
    if (!emptyRowFound && !idInput.value && !nameInput.value) {
      idInput.value = id; nameInput.value = name; emptyRowFound = true;
    }
  });
  if (!emptyRowFound) {
    addEmpRow();
    const cards = document.querySelectorAll('.emp-card');
    const lastCard = cards[cards.length - 1];
    lastCard.querySelector('.emp-id').value = id;
    lastCard.querySelector('.emp-name').value = name;
  }
  Swal.fire({ title: 'เพิ่มลงรายการเบิกแล้ว', icon: 'success', toast: true, position: 'top', showConfirmButton: false, timer: 1500 });
}
  
function updateSummary(){
  let sum = 0;
  document.querySelectorAll('.emp-amount').forEach(el => { sum += parseFloat(el.value) || 0; });
  document.getElementById('count-emp').textContent = document.querySelectorAll('.emp-card').length;
  document.getElementById('sum-amount').textContent = sum.toLocaleString('th-TH', { minimumFractionDigits: 2 });
}

// ── Submit ──
async function submitRequests(){
  if (!currentUser || !lineUserId) { alert('กรุณาเปิดแอปใหม่'); return; }
  const siteEl   = document.getElementById('siteSelect');
  const siteId   = siteEl.value;
  const siteName = siteEl.options[siteEl.selectedIndex].text;
  if (!siteId) { Swal.fire('แจ้งเตือน', 'กรุณาเลือกหน่วยงาน', 'warning'); return; }

  let rows = [], hasErr = false;
  let tempIds = []; // 🌟 เก็บ ID ไว้เช็คซ้ำบนหน้าเว็บ
  let duplicateInForm = false;

  document.querySelectorAll('.emp-card').forEach(card => {
    const id       = card.querySelector('.emp-id').value;
    const nm       = card.querySelector('.emp-name').value;
    const sh       = card.querySelector('.emp-shift').value;
    const amt      = card.querySelector('.emp-amount').value;
    const typ      = card.querySelector('.emp-type').value;
    const empSite  = card.querySelector('.emp-site').value; // หน่วยงานที่ลง (ถ้าเลือก)
    const empNote  = (card.querySelector('.emp-note') ? card.querySelector('.emp-note').value : '').trim();

    if (!id && !amt) return;

    if (!id || !amt || !nm || nm.includes('⚠️') || nm === 'กำลังค้นหา...') {
      card.style.borderColor = '#ef4444'; hasErr = true; return;
    }

    // 🌟 เช็คว่ากรอกรหัสพนักงานซ้ำในหน้าเดียวกันหรือไม่
    if (tempIds.includes(id)) {
      duplicateInForm = true;
      card.style.borderColor = '#ef4444';
    }
    tempIds.push(id);

    card.style.borderColor = '';
    // ถ้าเลือกหน่วยงานที่ลงไว้ → ใช้ค่านั้น, ถ้าไม่ → ใช้หน่วยงานประจำ (defaultSite ที่ dropdown ถูก set ไว้แล้ว)
    rows.push({ id, name: nm, amount: parseFloat(amt), shift: sh, type: typ, site: empSite || siteName, note: empNote });
  });

  // ถ้ากรอกพนักงานซ้ำกันในหน้าเดียวกัน ให้แจ้งเตือนทันที
  if (duplicateInForm) {
    Swal.fire('ข้อมูลซ้ำซ้อน', 'คุณกรอกรหัสพนักงานซ้ำกันมากกว่า 1 รายการ กรุณาลบกล่องที่ซ้ำออก', 'error');
    setTimeout(() => document.querySelectorAll('.emp-card').forEach(c => c.style.borderColor = ''), 3000);
    return;
  }

  if (hasErr) {
    Swal.fire('ข้อมูลไม่ถูกต้อง', 'กรุณาตรวจสอบรายการที่ขึ้นกรอบแดง', 'error');
    setTimeout(() => document.querySelectorAll('.emp-card').forEach(c => c.style.borderColor = ''), 3000);
    return;
  }
  if (!rows.length) { Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลพนักงานอย่างน้อย 1 คน', 'warning'); return; }

  const cf = await Swal.fire({
    title: 'ยืนยันการส่ง?',
    html: `<b>หน่วยงาน:</b> ${siteName}<br><b>จำนวน:</b> ${rows.length} คน<br><b>รวม:</b> ${rows.reduce((s,r)=>s+r.amount,0).toLocaleString()} บาท`,
    icon: 'question', showCancelButton: true,
    confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#06C755'
  });
  if (!cf.isConfirmed) return;

  Swal.fire({ title: 'กำลังส่ง...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const r = await callBackend('saveLineRequests', {
      headName: currentUser.name,
      site:     siteId,
      userId:   lineUserId,
      rows:     JSON.stringify(rows)
    });
    
    if (r.success) {
      await Swal.fire({ icon: 'success', title: 'ส่งสำเร็จ!', text: 'Admin จะดำเนินการโอนเงินต่อไป', confirmButtonColor: '#06C755' });
      document.getElementById('siteSelect').value = '';
      document.getElementById('empList').innerHTML = '';
      empRowCount = 0; addEmpRow();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      // 🌟 แสดงหน้าต่าง Error หรูๆ กรณีมีคนเบิกไปแล้ว
      Swal.fire({
        icon: 'error',
        title: 'ไม่สามารถเบิกได้!',
        html: `<span style="color:#ef4444; font-weight:600;">${r.message.replace(/\n/g, '<br>')}</span>`,
        confirmButtonColor: '#101B4D'
      });
    }
  } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อ server ไม่ได้: ' + e, 'error'); }
}

// ── History (ประวัติการเบิก & แก้ไขรายการ) ──
window._reqDataCache = {};  // เก็บ snapshot ของแต่ละ row ไว้ให้ editReqAmount ใช้

async function loadMyRequests(){
  if (!lineUserId) return;
  document.getElementById('history-list').innerHTML = '<div class="text-center py-5 text-muted"><i class="fas fa-spinner fa-spin fa-2x"></i> กำลังโหลดประวัติ...</div>';
  try {
    const rows = await callBackend('getMyRequests', { lineUserId });
    if (!rows || !rows.length) {
      document.getElementById('history-list').innerHTML = '<div class="text-center py-5 text-muted"><i class="fas fa-inbox fa-2x mb-2 d-block" style="opacity:.3"></i>ยังไม่มีรายการ</div>';
      return;
    }
    window._reqDataCache = {};
    let html = '';
    rows.forEach(r => {
      // เก็บ snapshot ไว้ใช้ใน editReqAmount
      window._reqDataCache[r.reqId] = { amount: r.amount, type: r.type, note: r.note || '', site: r.site };

      // ตรวจสอบสถานะ: ถ้ายอดนี้มีคำว่า Transferred ถือว่าโอนแล้ว (นอกนั้นถือว่ารอดำเนินการทั้งหมด)
      const isTransferred = (r.status === 'Transferred' || r.status === 'โอนแล้ว');
      const bc = isTransferred ? 'badge-transferred' : 'badge-pending';
      const st = isTransferred ? '✅ โอนแล้ว' : '⏳ รอดำเนินการ';

      // แถวโน้ต (แสดงเฉพาะเมื่อมีค่า)
      const noteRow = r.note ? `<div class="col-12"><span class="text-muted">โน้ต:</span> <span class="text-secondary">${r.note}</span></div>` : '';

      // 🌟 ปุ่มแก้ไข + ยกเลิกเบิก ถ้าสถานะเป็น "รอดำเนินการ" 🌟
      const editBtn = !isTransferred ? `
        <div class="col-12 mt-2 pt-2 border-top">
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary flex-fill" onclick="editReqAmount('${r.reqId}')" style="font-size:0.85rem; font-weight:600;">
              <i class="fas fa-edit me-1"></i> แก้ไข
            </button>
            <button class="btn btn-sm btn-outline-danger flex-fill" onclick="cancelReq('${r.reqId}')" style="font-size:0.85rem; font-weight:600;">
              <i class="fas fa-times-circle me-1"></i> ยกเลิกเบิก
            </button>
          </div>
        </div>` : '';

      html += `
        <div class="section-card mb-2">
          <div class="card-head d-flex justify-content-between">
            <span style="font-size:.8rem;"><i class="fas fa-clock me-1"></i>${r.timestamp}</span>
            <span class="badge rounded-pill ${bc}" style="font-size:.75rem;padding:3px 9px;">${st}</span>
          </div>
          <div class="form-wrap">
            <div class="row g-1" style="font-size:.85rem; align-items: center;">
              <div class="col-6"><span class="text-muted">พนักงาน:</span> <b>${r.empName}</b></div>
              <div class="col-6"><span class="text-muted">รหัส:</span> ${r.empId}</div>
              <div class="col-6"><span class="text-muted">หน่วยงาน:</span> ${r.site}</div>
              <div class="col-6"><span class="text-muted">ผลัด:</span> ${r.shift || '-'}</div>
              <div class="col-6"><span class="text-muted">ประเภท:</span> <span class="text-primary">${r.type || '-'}</span></div>
              <div class="col-6 text-end"><b class="text-success" style="font-size:1rem;">${parseFloat(r.amount).toLocaleString()} ฿</b></div>
              ${noteRow}
            </div>
            ${editBtn}
          </div>
        </div>`;
    });
    document.getElementById('history-list').innerHTML = html;
  } catch(e) {
    document.getElementById('history-list').innerHTML = '<div class="text-center text-danger p-4">โหลดไม่สำเร็จ: ' + e + '</div>';
  }
}

// 🌟 ฟังก์ชันแก้ไขรายการเบิก (amount, ประเภท, note, หน่วยงานที่ลง) 🌟
async function editReqAmount(reqId) {
  const cur = (window._reqDataCache || {})[reqId] || {};
  const curAmount = cur.amount != null ? cur.amount : 0;
  const curType   = cur.type  || 'เบิกล่วงหน้า';
  const curNote   = cur.note  || '';
  const curSite   = cur.site  || '';

  // โหลด site options (ใช้ cache ที่โหลดแล้วตอน init)
  await ensureAllSitesLoaded();
  const siteOptsHtml = (allSitesCache || [])
    .map(s => `<option value="${s.name}"${s.name === curSite ? ' selected' : ''}>${s.id} - ${s.name}</option>`)
    .join('');
  const typeList = ['เบิกล่วงหน้า', 'เบิกรายวันคนใหม่', 'รับสดควงเวร', 'รับสดรายวัน'];
  const typeOptsHtml = typeList
    .map(t => `<option value="${t}"${t === curType ? ' selected' : ''}>${t}</option>`)
    .join('');

  const { value: formValues, isConfirmed } = await Swal.fire({
    title: 'แก้ไขรายการเบิก',
    html: `
      <div style="text-align:left; padding: 0 4px;">
        <div style="margin-bottom:12px;">
          <label style="font-weight:600; font-size:.85rem; display:block; margin-bottom:4px;">จำนวนเงิน (฿)</label>
          <input id="swal-amount" type="number" class="swal2-input"
            value="${curAmount}" placeholder="0" min="1"
            style="margin:0; width:100%; box-sizing:border-box;">
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-weight:600; font-size:.85rem; display:block; margin-bottom:4px;">ประเภทการเบิก</label>
          <select id="swal-type" class="swal2-select"
            style="margin:0; width:100%; display:block; box-sizing:border-box;">
            ${typeOptsHtml}
          </select>
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-weight:600; font-size:.85rem; display:block; margin-bottom:4px;">หน่วยงานที่ลง</label>
          <select id="swal-site" class="swal2-select"
            style="margin:0; width:100%; display:block; box-sizing:border-box;">
            <option value="">-- ไม่เปลี่ยน (คงเดิม) --</option>
            ${siteOptsHtml}
          </select>
        </div>
        <div style="margin-bottom:4px;">
          <label style="font-weight:600; font-size:.85rem; display:block; margin-bottom:4px;">โน้ต <span style="font-weight:400; color:#888;">(ถ้ามี)</span></label>
          <input id="swal-note" type="text" class="swal2-input"
            value="${curNote.replace(/"/g, '&quot;')}" placeholder="หมายเหตุเพิ่มเติม..."
            style="margin:0; width:100%; box-sizing:border-box;">
        </div>
      </div>`,
    showCancelButton: true,
    confirmButtonText: 'บันทึก',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#06C755',
    focusConfirm: false,
    preConfirm: () => {
      const amount = parseFloat(document.getElementById('swal-amount').value);
      if (!amount || amount <= 0) {
        Swal.showValidationMessage('กรุณาระบุยอดเงินที่ถูกต้อง');
        return false;
      }
      const selSite = document.getElementById('swal-site').value;
      return {
        amount: amount,
        type:   document.getElementById('swal-type').value,
        site:   selSite || curSite,   // ถ้าไม่เลือกใหม่ ใช้ค่าเดิม
        note:   document.getElementById('swal-note').value.trim()
      };
    }
  });

  if (!isConfirmed || !formValues) return;

  Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const res = await callBackend('editRequestAmount', {
      reqId:     reqId,
      lineUserId: lineUserId,
      newAmount: formValues.amount,
      newType:   formValues.type,
      newSite:   formValues.site,
      newNote:   formValues.note
    });
    if (res.success) {
      Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'แก้ไขรายการเรียบร้อยแล้ว', timer: 1500, showConfirmButton: false });
      loadMyRequests();
    } else {
      Swal.fire('ผิดพลาด', res.message, 'error');
    }
  } catch(e) {
    Swal.fire('ผิดพลาด', 'เชื่อมต่อ server ไม่ได้', 'error');
  }
}

// 🌟 ฟังก์ชันยกเลิกการเบิก 🌟
async function cancelReq(reqId) {
  const cf = await Swal.fire({
    title: 'ยืนยันยกเลิกเบิก?',
    text: 'รายการนี้จะถูกลบออกและไม่สามารถกู้คืนได้',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'ยืนยันยกเลิก',
    cancelButtonText: 'ไม่ยกเลิก',
    confirmButtonColor: '#ef4444',
    cancelButtonColor: '#6b7280'
  });
  if (!cf.isConfirmed) return;

  Swal.fire({ title: 'กำลังดำเนินการ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const r = await callBackend('cancelRequest', { reqId: reqId, lineUserId: lineUserId });
    if (r.success) {
      Swal.fire({ icon: 'success', title: 'ยกเลิกสำเร็จ', text: 'ลบรายการเบิกเรียบร้อยแล้ว', timer: 1500, showConfirmButton: false });
      loadMyRequests();
    } else {
      Swal.fire('ผิดพลาด', r.message, 'error');
    }
  } catch(e) {
    Swal.fire('ผิดพลาด', 'เชื่อมต่อ server ไม่ได้', 'error');
  }
}

let allSitesCache = [];
let allSiteOptionsHtml = '';

// โหลดหน่วยงานทั้งหมด 1 ครั้ง แล้วทำ option HTML ไว้ใช้ทุกแถว
async function ensureAllSitesLoaded(){
  if (allSitesCache.length) return;

  const res = await callBackend('getAllSites'); // backend คืน [{id,name}]
  allSitesCache = Array.isArray(res) ? res : (res && res.sites ? res.sites : []);

  // ใช้ value เป็น site name เพื่อให้ตรงกับ defaultSite ที่ findEmpName set และบันทึกลง sheet
  const optHtml = (allSitesCache || [])
    .map(s => `<option value="${s.name}">${s.id} - ${s.name}</option>`)
    .join('');

  allSiteOptionsHtml     = optHtml;
  window.siteOptionsHtml = optHtml; // sync ให้ addEmpRow() อ่านได้
}

async function loadAllSitesToOptions(){
  // delegate ไปที่ ensureAllSitesLoaded เพื่อไม่ให้ call API ซ้ำ
  await ensureAllSitesLoaded();
}
</script>
